services:
  traefik:
    image: ${TRAEFIK_IMAGE}
    container_name: traefik
    restart: always
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.swarmmode=false"
      - "--providers.docker.watch=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--entrypoints.frontend.address=:4200"
      - "--entrypoints.backend.address=:8081"
      - "--entrypoints.vault.address=:8200"
    ports:
      - "4200:4200"
      - "8081:8081"
      - "8200:8200"
    networks:
      - app_network
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

  frontend:
    build:
      context: ${FRONT_END_CONTEXT}
      dockerfile: Dockerfile
    container_name: datashare_frontend
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.routers.frontend.entrypoints=frontend"
    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: datashare_backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.backend.loadbalancer.server.port=8081"
      - "traefik.http.routers.backend.rule=Host(`localhost`)"
      - "traefik.http.routers.backend.entrypoints=backend"
    ports:
      - "5005:5005"
    networks:
      - app_network
    volumes:
      - ./target:/app
      - ./uploads:${DATA_PATH}
    environment:
      DB_USER: '${DB_USER}'
      DB_PASSWORD: '${DB_PASSWORD}'
      DB_HOST: '${DB_HOST}'
      DB_PORT: '${DB_PORT}'
      DB_NAME: '${DB_NAME}'
      DATA_PATH: '${DATA_PATH}'
      VAULT_ADDR: "http://vault:8200"
    depends_on:
      - db
      - vault

  vault:
    image: ${VAULT_IMAGE}
    container_name: datashare_vault
    restart: always
    environment:
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_UI: "true"
    cap_add:
      - IPC_LOCK
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vault.rule=Host(`localhost`)"
      - "traefik.http.routers.vault.entrypoints=vault"
    networks:
      - app_network

  db:
    image: ${POSTGRES_IMAGE}
    container_name: datashare_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  db_data: