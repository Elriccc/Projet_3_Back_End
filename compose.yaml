services:
  backend:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: datashare_backend
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:${DATA_PATH}
    environment:
      DB_USER: '${DB_USER}'
      DB_PASSWORD: '${DB_PASSWORD}'
      DB_HOST: '${DB_HOST}'
      DB_PORT: '${DB_PORT}'
      DB_NAME: '${DB_NAME}'
      DATA_PATH: '${DATA_PATH}'
    networks:
      - app_network

  vault:
    image: '${VAULT_IMAGE}'
    container_name: 'datashare_vault'
    restart: always
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_LOCAL_CONFIG: |
        {
          "ui": true
        }
    cap_add:
      - IPC_LOCK
    networks:
      - app_network

  db:
    image: '${POSTGRES_IMAGE}'
    container_name: 'datashare_db'
    environment:
      - 'POSTGRES_DB=${DB_NAME}'
      - 'POSTGRES_USER=${DB_USER}'
      - 'POSTGRES_PASSWORD=${DB_PASSWORD}'
      - 'PGDATA=/var/lib/postgresql/data/pgdata'
    ports:
      - '${DB_PORT}:${DB_PORT}'
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_network

networks:
  app_network:

volumes:
  db_data: