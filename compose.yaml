services:
  traefik:
    image: ${TRAEFIK_IMAGE}
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.insecure=false"
      - "--api.dashboard=false"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--providers.docker=true"
      - "--providers.docker.network=app_network"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--entrypoints.frontend.address=:4200"
      - "--entrypoints.backend.address=:8081"
      - "--entrypoints.vault.address=:8200"
    ports:
      - "4200:4200"
      - "8081:8081"
      - "8200:8200"
    networks:
      - app_network
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  frontend:
    build:
      context: ${FRONT_END_CONTEXT}
      dockerfile: Dockerfile
    container_name: datashare_frontend
    restart: unless-stopped
    init: true
    volumes:
      - ${FRONT_END_CONTEXT}:/app
      - node_modules:/app/node_modules
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=app_network"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.routers.frontend.entrypoints=frontend"
      - "traefik.http.middlewares.frontend-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.frontend-ratelimit.ratelimit.burst=200"
      - "traefik.http.middlewares.frontend-inflight.inflightreq.amount=100"
      - "traefik.http.middlewares.frontend-compress.compress=true"
      - "traefik.http.routers.frontend.middlewares=frontend-ratelimit,frontend-inflight,frontend-compress"
    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: datashare_backend
    restart: unless-stopped
    init: true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=app_network"
      - "traefik.http.services.backend.loadbalancer.server.port=8081"
      - "traefik.http.routers.backend.rule=Host(`localhost`)"
      - "traefik.http.routers.backend.entrypoints=backend"
      - "traefik.http.middlewares.backend-ratelimit.ratelimit.average=20"
      - "traefik.http.middlewares.backend-ratelimit.ratelimit.burst=40"
      - "traefik.http.middlewares.backend-inflight.inflightreq.amount=50"
      - "traefik.http.routers.backend.middlewares=backend-ratelimit,backend-inflight"
    ports:
      - "5005:5005"
    networks:
      - app_network
      - internal_network
    volumes:
      - ./target:/app:delegated
      - ./uploads:${DATA_PATH}
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DATA_PATH: ${DATA_PATH}
      VAULT_ADDR: "http://vault:8200"
    depends_on:
      - db
      - vault
      - vault-init

  vault:
    image: ${VAULT_IMAGE}
    container_name: datashare_vault
    restart: unless-stopped
    environment:
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_UI: "true"
    cap_add:
      - IPC_LOCK
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=app_network"
      - "traefik.http.routers.vault.rule=Host(`localhost`)"
      - "traefik.http.routers.vault.entrypoints=vault"
    networks:
      - app_network

  vault-init:
    image: ${VAULT_IMAGE}
    container_name: datashare_vault_init
    depends_on:
      - vault
    networks:
      - app_network
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    volumes:
      - ./init-vault.sh:/init-vault.sh:ro
    entrypoint: [ "sh", "/init-vault.sh" ]
    restart: "no"

  db:
    image: ${POSTGRES_IMAGE}
    container_name: datashare_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal_network

networks:
  app_network:
    driver: bridge
  internal_network:
    internal: true

volumes:
  db_data:
  node_modules: