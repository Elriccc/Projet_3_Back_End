spring:
  application:
    name: datashare-backend
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
  servlet:
    multipart:
      enabled: true
      max-file-size: 8192MB
      max-request-size: 8193MB
  cloud:
    vault:
      fail-fast: false
      uri: http://vault:8200
      token: root
      kv:
        enabled: true
        backend: secret
        default-context: "kv/datashare-backend"
  config:
    import: optional:vault://

server:
  port: 8081

app:
  data-path: ${DATA_PATH}
  no-user-directory: "/anonymous/"

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

management:
  endpoints:
    web:
      exposure:
        include: '*'

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    default-model-expand-depth: -1